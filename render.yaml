services:
  - type: web
    plan: free
    name: AxiomMRT
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python Axiom.py
    repo: https://github.com/OwnerAxiom/AxiomMRT
    branch: master
    autoDeploy: false
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: OWNER
        sync: false
